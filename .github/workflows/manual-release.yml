name: manual release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

env:
  GOPATH: ${{ github.workspace }}
  WORKSPACE: ${{ github.workspace }}/src/github.com/${{ github.repository }}

jobs:
  goreleaser:
    defaults:
      run:
        working-directory: ${{ env.WORKSPACE }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag input
        working-directory: ${{ github.workspace }}
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag must match vX.Y.Z"
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          path: ${{ env.WORKSPACE }}
      - name: Verify checked out tag
        env:
          TAG: ${{ inputs.tag }}
        run: test "$(git describe --tags --exact-match)" = "$TAG"
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ env.WORKSPACE }}/go.mod
          cache: true
          cache-dependency-path: ${{ env.WORKSPACE }}/go.sum
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: ${{ env.WORKSPACE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
